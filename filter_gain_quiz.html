<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filter Gain Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap"
    rel="stylesheet">
  <link rel="icon" href="data:,">
  <style>
    :root {
      --bg: #0a0d14;
      --panel: #0f1420;
      --border: #1e2d4a;
      --accent: #00e5ff;
      --accent2: #ff6b35;
      --accent3: #00ff99;
      --accent4: #ff3d9a;
      --accent5: #a78bfa;
      --grid: rgba(0, 229, 255, 0.06);
      --text: #c8d8e8;
      --label: #5a7a9a;
      --glow: 0 0 20px rgba(0, 229, 255, 0.3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      font-weight: 900;
      letter-spacing: .12em;
      color: var(--accent);
      text-shadow: 0 0 30px rgba(0, 229, 255, .5);
      text-transform: uppercase;
    }

    header p {
      margin-top: .5rem;
      color: var(--label);
      font-size: .8rem;
      letter-spacing: .2em;
      text-transform: uppercase;
    }

    .quiz-wrap {
      width: 100%;
      max-width: 1200px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .score-bar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: .8rem;
    }

    .score-item {
      text-align: center;
    }

    .score-label {
      font-size: .6rem;
      letter-spacing: .2em;
      color: var(--label);
      text-transform: uppercase;
    }

    .score-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin-top: 2px;
    }

    .score-value.correct {
      color: var(--accent3);
    }

    .score-value.wrong {
      color: var(--accent2);
    }

    .score-value.qnum {
      color: var(--accent);
    }

    .progress-bar {
      flex: 1;
      min-width: 120px;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width .4s ease;
      box-shadow: 0 0 8px rgba(0, 229, 255, .5);
    }

    .question-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    .q-body {
      display: grid;
      grid-template-columns: 1fr 3fr;
      gap: 1.2rem;
      align-items: start;
    }

    @media(max-width:800px) {
      .q-body {
        grid-template-columns: 1fr;
      }
    }

    .q-left {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      height: 500px;
      justify-content: space-between;
    }

    .q-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .5rem;
    }

    .q-title {
      font-family: 'Orbitron', sans-serif;
      font-size: .7rem;
      letter-spacing: .15em;
      color: var(--label);
      text-transform: uppercase;
    }

    .filter-badge {
      font-size: .62rem;
      padding: 3px 8px;
      border-radius: 2px;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .filter-badge.lp {
      background: rgba(0, 229, 255, .1);
      border: 1px solid rgba(0, 229, 255, .3);
      color: var(--accent);
    }

    .filter-badge.hp {
      background: rgba(255, 107, 53, .1);
      border: 1px solid rgba(255, 107, 53, .3);
      color: var(--accent2);
    }

    .q-scenario {
      background: rgba(0, 229, 255, .04);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .9rem 1rem;
      line-height: 1.9;
      font-size: .82rem;
    }

    .q-scenario .h1 {
      color: var(--accent);
      font-size: .95rem;
    }

    .q-scenario .h2 {
      color: var(--accent5);
      font-size: .95rem;
    }

    .q-question {
      font-size: .9rem;
      color: var(--accent2);
      line-height: 1.6;
      font-weight: bold;
    }

    .answer-row {
      display: flex;
      gap: .6rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .answer-label {
      font-size: .7rem;
      color: var(--label);
      white-space: nowrap;
    }

    .answer-input {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      width: 100px;
      padding: .45rem .6rem;
      background: rgba(0, 229, 255, .05);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--accent);
      text-align: center;
      outline: none;
      transition: border-color .2s;
    }

    .answer-input:focus {
      border-color: rgba(0, 229, 255, .5);
    }

    .answer-input.correct {
      border-color: var(--accent3);
      color: var(--accent3);
    }

    .answer-input.wrong {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .dbu {
      font-size: .72rem;
      color: var(--label);
    }

    .btn {
      padding: .5rem 1.1rem;
      border-radius: 3px;
      font-family: 'Share Tech Mono', monospace;
      font-size: .7rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .15s;
      border: 1px solid;
    }

    .btn-submit {
      background: rgba(0, 229, 255, .1);
      border-color: rgba(0, 229, 255, .4);
      color: var(--accent);
    }

    .btn-submit:hover {
      background: rgba(0, 229, 255, .2);
    }

    .btn-next {
      background: rgba(0, 255, 153, .1);
      border-color: rgba(0, 255, 153, .4);
      color: var(--accent3);
    }

    .btn-next:hover {
      background: rgba(0, 255, 153, .2);
    }

    .btn-restart {
      background: rgba(255, 107, 53, .1);
      border-color: rgba(255, 107, 53, .4);
      color: var(--accent2);
    }

    .btn-restart:hover {
      background: rgba(255, 107, 53, .2);
    }

    .result-banner {
      display: none;
      padding: .65rem 1rem;
      border-radius: 3px;
      font-size: .82rem;
      font-family: 'Orbitron', sans-serif;
      align-items: center;
      gap: .6rem;
    }

    .result-banner.correct {
      display: flex;
      background: rgba(0, 255, 153, .08);
      border: 1px solid rgba(0, 255, 153, .3);
      color: var(--accent3);
    }

    .result-banner.wrong {
      display: flex;
      background: rgba(255, 61, 154, .08);
      border: 1px solid rgba(255, 61, 154, .3);
      color: var(--accent4);
    }

    .result-icon {
      font-size: 1.2rem;
    }

    .graph-panel {
      background: rgba(0, 0, 0, .2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .6rem;
    }

    .graph-label {
      font-size: .58rem;
      letter-spacing: .15em;
      color: var(--label);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 4px;
    }

    canvas#quizGraph {
      width: 100%;
      border-radius: 2px;
      display: block;
    }

    .working-box {
      display: none;
      background: rgba(0, 0, 0, .2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.1rem 1.3rem;
    }

    .working-box.visible {
      display: block;
    }

    .working-title {
      font-family: 'Orbitron', sans-serif;
      font-size: .62rem;
      letter-spacing: .2em;
      color: var(--label);
      text-transform: uppercase;
      margin-bottom: .7rem;
      padding-bottom: .4rem;
      border-bottom: 1px solid var(--border);
    }

    .working-line {
      font-size: .78rem;
      color: var(--label);
      line-height: 2;
    }

    .working-line .w-val {
      color: var(--accent);
    }

    .working-line .w-val2 {
      color: var(--accent2);
    }

    .working-line .w-val3 {
      color: var(--accent3);
    }

    .working-line.total {
      margin-top: .4rem;
      padding-top: .4rem;
      border-top: 1px solid var(--border);
      color: var(--text);
      font-size: .85rem;
    }

    .final-card {
      display: none;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2rem;
      text-align: center;
      flex-direction: column;
      gap: 1.2rem;
      align-items: center;
    }

    .final-card.visible {
      display: flex;
    }

    .final-score {
      font-family: 'Orbitron', sans-serif;
      font-size: 3rem;
      font-weight: 900;
      color: var(--accent);
      text-shadow: var(--glow);
    }

    .final-label {
      font-size: .75rem;
      letter-spacing: .2em;
      color: var(--label);
      text-transform: uppercase;
    }

    .final-message {
      font-size: .85rem;
      color: var(--text);
      line-height: 1.7;
      max-width: 500px;
    }

    footer {
      margin-top: 2rem;
      font-size: .65rem;
      color: var(--label);
      opacity: .5;
      letter-spacing: .15em;
      text-transform: uppercase;
    }
  </style>
</head>

<body>
  <header>
    <h1>Filter Gain Quiz</h1>
    <p>RC Filter · Octaves & Decades · Gain Calculation</p>
  </header>
  <div class="quiz-wrap">
    <div class="score-bar">
      <div class="score-item">
        <div class="score-label">Question</div>
        <div class="score-value qnum" id="qnum">1 / 10</div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress" style="width:10%"></div>
      </div>
      <div class="score-item">
        <div class="score-label">Correct</div>
        <div class="score-value correct" id="scoreCorrect">0</div>
      </div>
      <div class="score-item">
        <div class="score-label">Wrong</div>
        <div class="score-value wrong" id="scoreWrong">0</div>
      </div>
    </div>
    <div class="question-card" id="questionCard">
      <div class="q-body">
        <div class="q-left">
          <div class="q-header">
            <div class="q-title" id="qTitle">Question 1</div>
            <span class="filter-badge lp" id="filterBadge">Low Pass</span>
          </div>
          <div class="q-scenario" id="qScenario">—</div>
          <div class="q-question" id="qQuestion">—</div>
          <div class="answer-row">
            <span class="answer-label">Answer:</span>
            <input type="number" class="answer-input" id="answerInput" placeholder="0" step="1">
            <span class="dbu">dB</span>
          </div>
          <div style="display:flex;gap:.6rem;flex-wrap:wrap;">
            <button class="btn btn-submit" id="btnSubmit" onclick="submitAnswer()">Check</button>
            <button class="btn btn-next" id="btnNext" style="display:none" onclick="nextQuestion()">Next →</button>
            <button class="btn btn-restart" onclick="restartQuiz()">↺</button>
          </div>
          <div class="result-banner" id="resultBanner">
            <span class="result-icon" id="resultIcon"></span>
            <span id="resultText"></span>
          </div>
        </div>
        <div class="graph-panel">
          <div class="graph-label">Gain vs Frequency — First Order RC Filter</div>
          <canvas id="quizGraph" height="380"></canvas>
        </div>
      </div>
      <div class="working-box" id="workingBox">
        <div class="working-title">Worked Solution</div>
        <div id="workingContent"></div>
      </div>
    </div>
    <div class="final-card" id="finalCard">
      <div class="final-label">Quiz Complete</div>
      <div class="final-score" id="finalScore">0 / 10</div>
      <div class="final-message" id="finalMessage">—</div>
      <button class="btn btn-restart" onclick="restartQuiz()">↺ Try Again</button>
    </div>
  </div>
  <footer>Barry Duncan · Filter Gain Quiz</footer>
  <script>
    const VALID_STEPS = [];
    for (let dec = 0; dec <= 2; dec++) {
      for (let oct = 0; oct <= 3; oct++) {
        if (dec === 0 && oct === 0) continue;
        const ratio = Math.pow(2, oct) * Math.pow(10, dec);
        if (ratio > 200) continue;
        VALID_STEPS.push({ octaves: oct, decades: dec, ratio });
      }
    }
    const BASE_FREQS = [44, 50, 100, 125, 250, 440, 500, 1000, 2000, 2500, 5000, 10000];
    const START_DBS = [-6, -10, -12, -20, -26, -30, -32, -40, -46, -50];
    const INSERTION_LOSS_DB = 3;

    // Colours used in graph — defined once for consistency
    const C_CYAN = '#00e5ff';
    const C_ORANGE = '#ff6b35';
    const C_GREEN = '#00ff99';
    const C_PURPLE = '#a78bfa';

    let questions = [], currentQ = 0, scoreCorrect = 0, scoreWrong = 0, answered = false;
    const graphCanvas = document.getElementById('quizGraph');
    const gCtx = graphCanvas.getContext('2d');
    const GP = { left: 72, right: 24, top: 54, bottom: 56 };

    function formatFreq(f) {
      if (f >= 1000) return (f / 1000 % 1 === 0 ? f / 1000 : (f / 1000).toFixed(1)) + 'kHz';
      return f + 'Hz';
    }

    function generateQuestion() {
      const filterType = Math.random() < 0.5 ? 'low' : 'high';
      const step = VALID_STEPS[Math.floor(Math.random() * VALID_STEPS.length)];
      let fA, fB, attempts = 0;
      do {
        fA = BASE_FREQS[Math.floor(Math.random() * BASE_FREQS.length)];
        fB = filterType === 'low' ? fA * step.ratio : fA / step.ratio;
        attempts++;
      } while ((fB < 20 || fB > 300000) && attempts < 50);
      const startDb = START_DBS[Math.floor(Math.random() * START_DBS.length)];
      const rolloff = step.octaves * 6 + step.decades * 20;
      return { filterType, fA, fB, startDb, exactAnswer: startDb - rolloff, rolloff, octaves: step.octaves, decades: step.decades, ratio: step.ratio };
    }

    function generateQuiz() { questions = []; for (let i = 0; i < 10; i++) questions.push(generateQuestion()); }

    function resizeGraph() {
      const dpr = window.devicePixelRatio || 1;
      const rect = graphCanvas.parentElement.getBoundingClientRect();
      graphCanvas.width = rect.width * dpr;
      graphCanvas.height = 500 * dpr;
      graphCanvas.style.height = '500px';
      gCtx.scale(dpr, dpr);
    }

    function dottedLine(x1, y1, x2, y2, colour, width, dash) {
      gCtx.strokeStyle = colour;
      gCtx.lineWidth = width || 1.2;
      gCtx.setLineDash(dash || [5, 4]);
      gCtx.beginPath(); gCtx.moveTo(x1, y1); gCtx.lineTo(x2, y2); gCtx.stroke();
      gCtx.setLineDash([]);
    }

    function solidLine(x1, y1, x2, y2, colour, width) {
      gCtx.strokeStyle = colour;
      gCtx.lineWidth = width || 1;
      gCtx.beginPath(); gCtx.moveTo(x1, y1); gCtx.lineTo(x2, y2); gCtx.stroke();
    }

    function dot(x, y, colour, radius, glowColour) {
      gCtx.fillStyle = colour;
      gCtx.shadowColor = glowColour || colour;
      gCtx.shadowBlur = 14;
      gCtx.beginPath(); gCtx.arc(x, y, radius || 7, 0, Math.PI * 2); gCtx.fill();
      gCtx.shadowBlur = 0;
    }

    function yLabel(text, y, colour, right) {
      gCtx.fillStyle = colour;
      gCtx.font = 'bold 13px Share Tech Mono';
      gCtx.textAlign = 'right';
      gCtx.fillText(text, GP.left - (right || 6), y + 5);
    }

    function drawGraph(q, reveal) {
      const dpr = window.devicePixelRatio || 1;
      const fullW = graphCanvas.width / dpr;
      const fullH = graphCanvas.height / dpr;
      const plotW = fullW - GP.left - GP.right;
      const plotH = fullH - GP.top - GP.bottom;

      gCtx.clearRect(0, 0, fullW, fullH);

      const passbandDb = -INSERTION_LOSS_DB;
      const logFA = Math.log10(q.fA);
      const logFB = Math.log10(q.fB);
      const logFmin_data = Math.min(logFA, logFB);
      const logFmax_data = Math.max(logFA, logFB);
      const logFminExt = q.filterType === 'low' ? logFmin_data - 3.0 : logFmin_data - 1.0;
      const logFmaxExt = q.filterType === 'low' ? logFmax_data + 1.0 : logFmax_data + 3.0;

      const dbTop = 5;
      const dbBot = Math.min(q.exactAnswer - 16, -70);
      const dbRange = dbTop - dbBot;

      function dbToY(db) { return GP.top + plotH * (1 - (db - dbBot) / dbRange); }
      function logFtoX(lf) { return GP.left + plotW * (lf - logFminExt) / (logFmaxExt - logFminExt); }

      // Derive fc
      const gainAtA = Math.pow(10, q.startDb / 20);
      const fc = q.filterType === 'low'
        ? q.fA / Math.sqrt(1 / (gainAtA * gainAtA) - 1)
        : q.fA * Math.sqrt(1 / (gainAtA * gainAtA) - 1);
      const logFc = Math.log10(fc);
      const xFc = logFtoX(logFc);

      function curveDb(f) {
        const ratio = f / fc;
        const gain = q.filterType === 'low'
          ? 1 / Math.sqrt(1 + ratio * ratio)
          : ratio / Math.sqrt(1 + ratio * ratio);
        return 20 * Math.log10(Math.max(gain, 1e-10)) + passbandDb;
      }

      // ── Plot border ───────────────────────────────────────────────────────
      gCtx.strokeStyle = 'rgba(0,229,255,0.2)';
      gCtx.lineWidth = 1;
      gCtx.strokeRect(GP.left, GP.top, plotW, plotH);

      // ── Background grid ───────────────────────────────────────────────────
      gCtx.setLineDash([2, 5]);
      for (let db = Math.ceil(dbBot / 10) * 10; db <= dbTop; db += 10) {
        const y = dbToY(db);
        if (y < GP.top || y > GP.top + plotH) continue;
        gCtx.strokeStyle = 'rgba(30,45,74,0.5)'; gCtx.lineWidth = 1;
        gCtx.beginPath(); gCtx.moveTo(GP.left, y); gCtx.lineTo(GP.left + plotW, y); gCtx.stroke();
      }
      for (let lf = Math.floor(logFminExt); lf <= Math.ceil(logFmaxExt); lf++) {
        const x = logFtoX(lf);
        if (x < GP.left || x > GP.left + plotW) continue;
        gCtx.strokeStyle = 'rgba(30,45,74,0.5)'; gCtx.lineWidth = 1;
        gCtx.beginPath(); gCtx.moveTo(x, GP.top); gCtx.lineTo(x, GP.top + plotH); gCtx.stroke();
      }
      gCtx.setLineDash([]);

      // ── THREE horizontal dotted lines at top ──────────────────────────────
      const y0db = dbToY(0);
      const yPb = dbToY(passbandDb);       // max gain (no label)
      const yFcDb = dbToY(passbandDb - 3);     // -3dB below passband = cutoff

      // 1. 0dB — cyan
      if (y0db >= GP.top && y0db <= GP.top + plotH) {
        dottedLine(GP.left, y0db, GP.left + plotW, y0db, 'rgba(0,229,255,0.55)', 1.5);
        yLabel('0dB', y0db, C_CYAN);
      }

      // 2. Max gain (passband) — cyan faint, no label
      if (yPb >= GP.top && yPb <= GP.top + plotH) {
        dottedLine(GP.left, yPb, GP.left + plotW, yPb, 'rgba(0,229,255,0.25)', 1.5);
      }

      // 3. -3dB cutoff — green, stops at fc vertical line, labelled on Y axis
      if (yFcDb >= GP.top && yFcDb <= GP.top + plotH) {
        dottedLine(GP.left, yFcDb, xFc, yFcDb, 'rgba(0,255,153,0.4)', 1.5);
        yLabel('−3dB', yFcDb, C_GREEN);
      }

      // ── Insertion loss annotation ─────────────────────────────────────────
      if (y0db >= GP.top && y0db <= GP.top + plotH && yPb >= GP.top && yPb <= GP.top + plotH) {
        const arrowX = GP.left + plotW * 0.38;
        const ilMidY = (y0db + yPb) / 2;
        gCtx.strokeStyle = 'rgba(255,107,53,0.75)'; gCtx.fillStyle = 'rgba(255,107,53,0.75)'; gCtx.lineWidth = 1.2;
        gCtx.beginPath(); gCtx.moveTo(arrowX, y0db + 3); gCtx.lineTo(arrowX, yPb - 3); gCtx.stroke();
        gCtx.beginPath(); gCtx.moveTo(arrowX, y0db + 2); gCtx.lineTo(arrowX - 4, y0db + 10); gCtx.lineTo(arrowX + 4, y0db + 10); gCtx.closePath(); gCtx.fill();
        gCtx.beginPath(); gCtx.moveTo(arrowX, yPb - 2); gCtx.lineTo(arrowX - 4, yPb - 10); gCtx.lineTo(arrowX + 4, yPb - 10); gCtx.closePath(); gCtx.fill();
        gCtx.fillStyle = 'rgba(255,107,53,0.85)';
        gCtx.font = 'bold 10px Share Tech Mono'; gCtx.textAlign = 'left';
        gCtx.fillText('Insertion Loss', arrowX + 7, ilMidY + 4);
      }

      // ── Cutoff frequency marker — GREEN ───────────────────────────────────
      const yCurveAtFc = dbToY(curveDb(fc));
      if (xFc >= GP.left && xFc <= GP.left + plotW) {
        // Vertical dashed green line from curve to X axis
        dottedLine(xFc, yCurveAtFc, xFc, GP.top + plotH, 'rgba(0,255,153,0.4)', 1.2);
        // Horizontal dashed green line from Y axis to fc point — already drawn as 3rd line above
        // fc label on X axis
        gCtx.fillStyle = 'rgba(0,255,153,0.7)';
        gCtx.font = 'bold 11px Share Tech Mono'; gCtx.textAlign = 'center';
        gCtx.fillText('fc', xFc, GP.top + plotH + 14);
      }

      // ── Draw filter curve ─────────────────────────────────────────────────
      const samples = plotW * 3;
      gCtx.shadowColor = 'rgba(0,229,255,0.4)'; gCtx.shadowBlur = 8;
      gCtx.strokeStyle = 'rgba(0,229,255,0.2)'; gCtx.lineWidth = 4;
      gCtx.beginPath(); let started = false;
      for (let px = 0; px <= samples; px++) {
        const lf = logFminExt + (px / samples) * (logFmaxExt - logFminExt);
        const f = Math.pow(10, lf);
        const x = logFtoX(lf);
        const y = Math.max(GP.top, Math.min(GP.top + plotH, dbToY(curveDb(f))));
        if (!started) { gCtx.moveTo(x, y); started = true; } else gCtx.lineTo(x, y);
      }
      gCtx.stroke();
      gCtx.shadowBlur = 0; gCtx.strokeStyle = C_CYAN; gCtx.lineWidth = 2.5;
      gCtx.beginPath(); started = false;
      for (let px = 0; px <= samples; px++) {
        const lf = logFminExt + (px / samples) * (logFmaxExt - logFminExt);
        const f = Math.pow(10, lf);
        const x = logFtoX(lf);
        const y = Math.max(GP.top, Math.min(GP.top + plotH, dbToY(curveDb(f))));
        if (!started) { gCtx.moveTo(x, y); started = true; } else gCtx.lineTo(x, y);
      }
      gCtx.stroke();

      // ── Known point — CYAN ────────────────────────────────────────────────
      const xA = logFtoX(logFA);
      const yCurveA = Math.max(GP.top, Math.min(GP.top + plotH, dbToY(curveDb(q.fA))));

      dottedLine(xA, yCurveA, xA, GP.top + plotH, 'rgba(0,229,255,0.45)', 1.2);
      dottedLine(GP.left, yCurveA, xA, yCurveA, 'rgba(0,229,255,0.45)', 1.2);
      dot(xA, yCurveA, C_CYAN, 7, 'rgba(0,229,255,0.9)');

      // Known freq label — BELOW plot on X axis, cyan to match dot
      gCtx.fillStyle = C_CYAN; gCtx.font = 'bold 14px Share Tech Mono'; gCtx.textAlign = 'center';
      gCtx.fillText(formatFreq(q.fA), xA, GP.top + plotH + 36);
      solidLine(xA, GP.top + plotH, xA, GP.top + plotH + 16, 'rgba(0,229,255,0.4)', 1);

      // Known dB on Y axis — CYAN
      yLabel(`${q.startDb}dB`, yCurveA, C_CYAN);

      // ── Unknown point — ORANGE ────────────────────────────────────────────
      const xB = logFtoX(logFB);
      const yCurveB = Math.max(GP.top, Math.min(GP.top + plotH, dbToY(curveDb(q.fB))));

      // Vertical drop line — cyan (frequency axis)
      dottedLine(xB, yCurveB, xB, GP.top + plotH, 'rgba(255,107,53,0.45)', 1.2);

      // Horizontal line to Y axis — ORANGE
      dottedLine(GP.left, yCurveB, xB, yCurveB, 'rgba(255,107,53,0.55)', 1.2);

      // Dot — orange (green after reveal)
      if (reveal) {
        dot(xB, yCurveB, C_GREEN, 7, 'rgba(0,255,153,0.9)');
        dottedLine(GP.left, yCurveB, xB, yCurveB, 'rgba(0,255,153,0.55)', 1.2);
      } else {
        dot(xB, yCurveB, C_ORANGE, 7, 'rgba(255,107,53,0.9)');
      }

      // Unknown freq label — BELOW plot, orange to match dot
      gCtx.fillStyle = C_ORANGE; gCtx.font = 'bold 14px Share Tech Mono'; gCtx.textAlign = 'center';
      gCtx.fillText(formatFreq(q.fB), xB, GP.top + plotH + 36);
      solidLine(xB, GP.top + plotH, xB, GP.top + plotH + 16, 'rgba(255,107,53,0.5)', 1);

      // Unknown dB on Y axis — ORANGE "?dB" before reveal, green after
      if (reveal) {
        yLabel(`${q.exactAnswer}dB`, yCurveB, C_GREEN);
        // Roll-off annotation
        const midX = (xA + xB) / 2; const midY = (yCurveA + yCurveB) / 2;
        gCtx.fillStyle = 'rgba(200,220,240,0.6)'; gCtx.font = 'bold 11px Share Tech Mono'; gCtx.textAlign = 'center';
        gCtx.fillText(`−${q.rolloff} dB`, midX, midY - 12);
      } else {
        yLabel('?dB', yCurveB, C_ORANGE);
      }

      // ── X axis decade labels ──────────────────────────────────────────────
      gCtx.fillStyle = 'rgba(200,220,240,0.3)'; gCtx.font = '9px Share Tech Mono'; gCtx.textAlign = 'center';
      for (let lf = Math.floor(logFminExt); lf <= Math.ceil(logFmaxExt); lf++) {
        const x = logFtoX(lf);
        if (x < GP.left || x > GP.left + plotW) continue;
        gCtx.fillText(formatFreq(Math.pow(10, lf)), x, GP.top + plotH + 48);
      }

      // Axis titles
      gCtx.fillStyle = 'rgba(200,220,240,0.3)'; gCtx.font = '8px Share Tech Mono'; gCtx.textAlign = 'center';
      gCtx.fillText('FREQUENCY', GP.left + plotW / 2, fullH - 2);
      gCtx.save(); gCtx.translate(10, GP.top + plotH / 2); gCtx.rotate(-Math.PI / 2);
      gCtx.fillText('GAIN (dB)', 0, 0); gCtx.restore();
    }

    function renderQuestion() {
      const q = questions[currentQ]; answered = false;
      document.getElementById('qnum').textContent = `${currentQ + 1} / 10`;
      document.getElementById('progress').style.width = `${(currentQ + 1) * 10}%`;
      document.getElementById('qTitle').textContent = `Question ${currentQ + 1}`;
      document.getElementById('scoreCorrect').textContent = scoreCorrect;
      document.getElementById('scoreWrong').textContent = scoreWrong;
      const badge = document.getElementById('filterBadge');
      badge.textContent = q.filterType === 'low' ? 'Low Pass' : 'High Pass';
      badge.className = `filter-badge ${q.filterType === 'low' ? 'lp' : 'hp'}`;
      const dir = q.filterType === 'low' ? 'frequency increases into the stopband' : 'frequency decreases into the stopband';
      document.getElementById('qScenario').innerHTML = `
      A <strong>${q.filterType === 'low' ? 'low pass' : 'high pass'}</strong> filter has a gain of
      <span class="h1">${q.startDb} dB</span> at <span class="h1">${formatFreq(q.fA)}</span>.
      <br>As ${dir}, the gain rolls off at
      <span class="h2">−6 dB/octave / −20 dB/decade</span>.`;
      document.getElementById('qQuestion').innerHTML =
        `What is the gain at <span style="color:var(--accent2)">${formatFreq(q.fB)}</span>?`;
      const input = document.getElementById('answerInput');
      input.value = ''; input.className = 'answer-input'; input.disabled = false; input.focus();
      document.getElementById('resultBanner').className = 'result-banner';
      document.getElementById('workingBox').className = 'working-box';
      document.getElementById('btnNext').style.display = 'none';
      document.getElementById('btnSubmit').style.display = 'inline-block';
      document.getElementById('questionCard').style.display = 'flex';
      document.getElementById('finalCard').className = 'final-card';
      resizeGraph(); drawGraph(q, false);
    }

    function submitAnswer() {
      if (answered) return;
      const q = questions[currentQ];
      const input = document.getElementById('answerInput');
      const val = parseInt(input.value);
      if (isNaN(val)) { input.focus(); return; }
      answered = true; input.disabled = true;
      document.getElementById('btnSubmit').style.display = 'none';
      document.getElementById('btnNext').style.display = 'inline-block';
      const isCorrect = val === q.exactAnswer;
      if (isCorrect) {
        scoreCorrect++; input.className = 'answer-input correct';
        const b = document.getElementById('resultBanner'); b.className = 'result-banner correct';
        document.getElementById('resultIcon').textContent = '✓';
        document.getElementById('resultText').textContent = `Correct! ${val} dB`;
      } else {
        scoreWrong++; input.className = 'answer-input wrong';
        const b = document.getElementById('resultBanner'); b.className = 'result-banner wrong';
        document.getElementById('resultIcon').textContent = '✗';
        document.getElementById('resultText').textContent = `Not quite — you said ${val} dB. See working below.`;
      }
      document.getElementById('scoreCorrect').textContent = scoreCorrect;
      document.getElementById('scoreWrong').textContent = scoreWrong;
      drawGraph(q, true); showWorking(q);
    }

    function showWorking(q) {
      document.getElementById('workingBox').className = 'working-box visible';
      const decDb = q.decades * 20, octDb = q.octaves * 6;
      const ratioLabel = q.filterType === 'low'
        ? `${formatFreq(q.fB)} ÷ ${formatFreq(q.fA)} = ${q.ratio}×`
        : `${formatFreq(q.fA)} ÷ ${formatFreq(q.fB)} = ${q.ratio}×`;
      document.getElementById('workingContent').innerHTML = `
      <div class="working-line">Frequency ratio: <span class="w-val">${ratioLabel}</span>
        = <span class="w-val">2<sup>${q.octaves}</sup> × 10<sup>${q.decades}</sup></span>
        = <span class="w-val">${q.octaves} octave${q.octaves !== 1 ? 's' : ''}</span> + <span class="w-val2">${q.decades} decade${q.decades !== 1 ? 's' : ''}</span></div>
      <br>
      <div class="working-line" style="color:var(--accent5);">Roll-off calculation:</div>
      <div class="working-line">Decades: <span class="w-val2">${q.decades} × 20 dB = ${decDb} dB</span></div>
      <div class="working-line">Octaves: <span class="w-val">${q.octaves} × 6 dB = ${octDb} dB</span></div>
      <div class="working-line">Total roll-off: <span class="w-val">${decDb} + ${octDb} = ${q.rolloff} dB</span></div>
      <br>
      <div class="working-line total">
        Gain at ${formatFreq(q.fB)} = ${q.startDb} dB − ${q.rolloff} dB = <span class="w-val3">${q.exactAnswer} dB</span>
      </div>`;
    }

    function nextQuestion() { currentQ++; if (currentQ >= 10) showFinal(); else renderQuestion(); }

    function showFinal() {
      document.getElementById('questionCard').style.display = 'none';
      const final = document.getElementById('finalCard'); final.className = 'final-card visible';
      document.getElementById('finalScore').textContent = `${scoreCorrect} / 10`;
      document.getElementById('progress').style.width = '100%';
      const msgs = [
        'Perfect score! Outstanding — you have a solid grasp of filter gain calculations.',
        'Excellent! Just a couple to review. Check the working for any you missed.',
        'Good effort. Review the octave and decade steps for the ones you missed.',
        'Keep practising. Each octave = −6dB, each decade = −20dB.',
        "Don't worry — this takes practice. Review the worked solutions and try again."
      ];
      document.getElementById('finalMessage').textContent = msgs[scoreCorrect === 10 ? 0 : scoreCorrect >= 8 ? 1 : scoreCorrect >= 6 ? 2 : scoreCorrect >= 4 ? 3 : 4];
    }

    function restartQuiz() { currentQ = 0; scoreCorrect = 0; scoreWrong = 0; answered = false; generateQuiz(); renderQuestion(); }

    document.getElementById('answerInput').addEventListener('keydown', e => { if (e.key === 'Enter') submitAnswer(); });
    window.addEventListener('resize', () => { if (questions.length > 0) { resizeGraph(); drawGraph(questions[currentQ], answered); } });

    generateQuiz(); renderQuestion();
  </script>
</body>

</html>
